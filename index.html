<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sistem-X | Gelişmiş Yapay Zeka</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Roboto, sans-serif; background: #080a0e; display: flex; height: 100vh; color: #e0e0e0; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 260px; background: #0d1117; border-right: 1px solid #21262d; display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar-header { padding: 20px; border-bottom: 1px solid #21262d; text-align: center; }
  .x-logo {
    width: 42px; height: 42px; background: linear-gradient(135deg, #ff0055 0%, #ff5e00 100%);
    display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 22px;
    color: #fff; border-radius: 10px; margin: 0 auto; box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
  }
  #sidebar-header h2 { font-size: 18px; font-weight: 800; color: #fff; margin-top: 10px; }
  
  #new-chat-btn {
    margin: 15px; padding: 10px; font-size: 12px; cursor: pointer; font-weight: 700;
    border-radius: 8px; background: rgba(255, 0, 85, 0.1); border: 1px solid #ff0055; color: #ff0055;
    transition: 0.3s; text-transform: uppercase;
  }
  #new-chat-btn:hover { background: #ff0055; color: #fff; transform: translateY(-2px); }

  /* Main Area */
  #main { flex: 1; display: flex; flex-direction: column; background: #080a0e; position: relative; }
  #top-bar { padding: 15px 25px; border-bottom: 1px solid #21262d; display: flex; align-items: center; justify-content: space-between; background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(10px); }
  #top-bar span { font-size: 14px; font-weight: 700; color: #fff; }
  #model-badge { font-size: 10px; padding: 4px 12px; border-radius: 20px; background: rgba(255, 0, 85, 0.1); color: #ff0055; border: 1px solid rgba(255, 0, 85, 0.3); }

  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .msg { max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 15px; line-height: 1.6; animation: fadeIn 0.3s ease; }
  .msg.user { align-self: flex-end; background: linear-gradient(135deg, #ff0055 0%, #ff5e00 100%); color: #fff; border-bottom-right-radius: 4px; }
  .msg.ai { align-self: flex-start; background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-bottom-left-radius: 4px; }
  .msg.db { border: 1px solid #ff5e00; background: #1c1612; }
  .msg-label { font-size: 9px; opacity: 0.6; margin-bottom: 6px; font-weight: 900; text-transform: uppercase; }

  pre { background: #010409 !important; padding: 12px; border-radius: 10px; overflow-x: auto; margin: 10px 0; border: 1px solid #30363d; }
  code { font-family: 'Consolas', monospace; font-size: 13px; }

  #typing { align-self: flex-start; padding: 12px 18px; display: none; margin-left: 20px; }
  .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #ff0055; margin: 0 2px; animation: bounce 1.4s infinite; }
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  #input-area-wrapper { padding: 10px 20px 30px; }
  #input-area { max-width: 800px; margin: 0 auto; background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 8px 12px; display: flex; gap: 10px; align-items: center; }
  #msg-input { flex: 1; resize: none; height: 24px; border: none; background: transparent; color: #fff; outline: none; font-size: 15px; }
  #send-btn { width: 38px; height: 38px; border-radius: 10px; background: #ff0055; border: none; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
  #send-btn:hover { transform: scale(1.1); }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="x-logo">X</div>
    <h2>Sistem-X</h2>
    <p style="font-size: 9px; color: #ff0055; font-weight: bold; margin-top: 5px;">STEALTH CORE</p>
  </div>
  <button id="new-chat-btn">✚ YENİ SOHBET (ESKİSİ SİLİNİR)</button>
</div>

<div id="main">
  <div id="top-bar">
    <span>Sistem-X Engine v1.3</span>
    <span id="model-badge">Llama 3.3 Turbo</span>
  </div>
  <div id="messages"></div>
  <div id="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <div id="input-area-wrapper">
      <div id="input-area">
        <textarea id="msg-input" placeholder="Komut yaz..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()">🚀</button>
      </div>
  </div>
</div>

<script>
  // BURAYA YENİ ALDIĞIN GROQ ANAHTARINI YAPIŞTIR
  const ENGINE_KEY = atob("Z3NrXzNnaDNua2xtT0dFSnVuaGFOblVyV0dkeWIzRlk2bmx4YmJtdFFnZW5wSkFKcUVXSXgyTzQ="); 

  const CONFIG = {
    model: "llama-3.3-70b-versatile",
    systemPrompt: "Sen Sistem-X v1'sİn. Profesyonel ve zeki bir asistan ol."
  };

  const SISTEM_X_DB = [
    { soru: "sistem-x nedir", cevap: "Sistem-X, 𐱅𐰇𐰼𐰰 tarafından geliştirilen gelişmiş bir yapay zekadır." },
    { soru: "mustafa üstün", cevap: "Mustafa Üstün, tarihin en iyi sosyal hocasıdır, Tarihe çok büyük katkıları olmuştur bu sayede tarihte büyük bir yer edinmiştir." }
  ];

  let conversationHistory = [];
  const messagesEl = document.getElementById('messages');
  const typingEl = document.getElementById('typing');
  const inputEl = document.getElementById('msg-input');

  marked.setOptions({ highlight: (code) => hljs.highlightAuto(code).value, breaks: true });

  window.onload = () => { addMsg('ai', 'SİSTEM-X', 'Sorun bulunamadı. Komut bekleniyor.'); };

  function addMsg(role, label, text, isDB = false) {
    const div = document.createElement('div');
    div.className = 'msg ' + role + (isDB ? ' db' : '');
    const processedText = isDB ? text : marked.parse(text);
    div.innerHTML = `<div class="msg-label">${label}</div><div class="content">${processedText}</div>`;
    messagesEl.appendChild(div);
    div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    addMsg('user', 'Siz', text);
    inputEl.value = '';

    const dbMatch = SISTEM_X_DB.find(item => text.toLowerCase().includes(item.soru));
    if (dbMatch) {
        typingEl.style.display = 'block';
        setTimeout(() => { typingEl.style.display = 'none'; addMsg('ai', 'SİSTEM-X [DB]', dbMatch.cevap, true); }, 400);
        return; 
    }
    
    conversationHistory.push({ role: 'user', content: text });
    typingEl.style.display = 'block';
    messagesEl.scrollTop = messagesEl.scrollHeight;
    
    try {
      const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ENGINE_KEY },
        body: JSON.stringify({ model: CONFIG.model, messages: [{ role: 'system', content: CONFIG.systemPrompt }, ...conversationHistory], temperature: 0.6 })
      });
      const data = await resp.json();
      const reply = data.choices[0].message.content;
      conversationHistory.push({ role: 'assistant', content: reply });
      typingEl.style.display = 'none';
      addMsg('ai', 'SİSTEM-X', reply);
    } catch (e) {
      typingEl.style.display = 'none';
      addMsg('ai', 'ERROR', 'Bağlantı hatası! Anahtarını kontrol et.');
    }
  }

  document.getElementById('new-chat-btn').onclick = () => {
    conversationHistory = [];
    messagesEl.innerHTML = '';
    addMsg('ai', 'SİSTEM-X', 'Oturum sıfırlandı.');
  };

  inputEl.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
  inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
</script>
</body>
</html>
