<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sistem-X | Gelişmiş Yapay Zeka</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #080a0e; display: flex; height: 100vh; color: #e0e0e0; overflow: hidden; }

  /* Logo Tasarımı (CSS ile) */
  .logo-container {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
  }
  .x-logo {
    width: 35px;
    height: 35px;
    background: linear-gradient(135deg, #ff0055 0%, #ff5e00 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 20px;
    color: #fff;
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
  }

  /* Kenar Çubuğu */
  #sidebar {
    width: 280px; background: #0d1117; border-right: 1px solid #21262d;
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  #sidebar-header { padding: 25px 20px; border-bottom: 1px solid #21262d; }
  #sidebar-header h2 { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 1px; }
  #sidebar-header p { font-size: 10px; color: #ff0055; margin-top: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
  
  #new-chat-btn {
    margin: 20px; padding: 12px; font-size: 13px; cursor: pointer; font-weight: 700;
    border-radius: 10px; background: transparent; border: 1px solid #ff0055; color: #ff0055;
    transition: all 0.3s ease; text-transform: uppercase;
  }
  #new-chat-btn:hover { background: rgba(255, 0, 85, 0.1); box-shadow: 0 0 15px rgba(255, 0, 85, 0.2); }

  #history-list { flex: 1; overflow-y: auto; padding: 5px 15px; }
  .hist-item {
    padding: 12px; border-radius: 8px; font-size: 13px; color: #8b949e;
    cursor: pointer; margin-bottom: 5px; transition: 0.2s;
  }
  .hist-item:hover { background: #161b22; color: #fff; }

  /* Ana Panel */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #080a0e; }
  #top-bar {
    padding: 18px 25px; border-bottom: 1px solid #21262d;
    display: flex; align-items: center; justify-content: space-between; background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(10px);
  }
  #top-bar span { font-size: 14px; font-weight: 700; color: #fff; }
  #model-badge {
    font-size: 10px; padding: 5px 14px; border-radius: 99px;
    background: rgba(255, 0, 85, 0.1); color: #ff0055; border: 1px solid rgba(255, 0, 85, 0.3);
  }

  /* Mesaj Alanı */
  #messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
  .msg { max-width: 80%; padding: 16px 20px; border-radius: 18px; font-size: 15px; line-height: 1.6; animation: fadeIn 0.3s ease; }
  .msg.user { align-self: flex-end; background: linear-gradient(135deg, #ff0055 0%, #ff5e00 100%); color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(255, 0, 85, 0.2); }
  .msg.ai { align-self: flex-start; background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-bottom-left-radius: 4px; }
  .msg.db { border: 1px solid #ff5e00; } /* Veritabanı yanıtları için farklı kenarlık */
  .msg-label { font-size: 10px; opacity: 0.7; margin-bottom: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

  /* Yazıyor... */
  #typing { align-self: flex-start; padding: 15px 20px; border-radius: 15px; background: #161b22; display: none; margin-left: 30px; }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #ff0055; margin: 0 3px; animation: bounce 1.4s infinite; }
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Giriş Alanı */
  #input-area-wrapper { padding: 20px 30px 40px; background: transparent; }
  #input-area { 
    background: #161b22; border: 1px solid #30363d; border-radius: 15px; 
    padding: 10px 15px; display: flex; gap: 10px; align-items: center;
    transition: 0.3s;
  }
  #input-area:focus-within { border-color: #ff0055; box-shadow: 0 0 15px rgba(255, 0, 85, 0.1); }
  
  #msg-input {
    flex: 1; resize: none; height: 24px; max-height: 150px;
    padding: 2px 5px; font-size: 15px; border: none; background: transparent; color: #fff; font-family: inherit;
  }
  #msg-input:focus { outline: none; }
  
  #send-btn {
    width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #ff0055 0%, #ff5e00 100%);
    border: none; cursor: pointer; color: #fff; transition: 0.3s;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  #send-btn:hover { transform: scale(1.1); filter: brightness(1.2); }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="logo-container">
        <div class="x-logo">X</div>
        <h2>Sistem-X</h2>
    </div>
    <p>Advanced Core Intelligence</p>
  </div>
  <button id="new-chat-btn">Yeni Terminal</button>
  <div id="history-list"></div>
</div>

<div id="main">
  <div id="top-bar">
    <span id="top-name">Sistem-X Engine v1.0</span>
    <span id="model-badge">Llama 3.3 Turbo</span>
  </div>
  <div id="messages"></div>
  <div id="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <div id="input-area-wrapper">
      <div id="input-area">
        <textarea id="msg-input" placeholder="Sistem-X'e komut gönder..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()">🚀</button>
      </div>
  </div>
</div>

<script>
  // --- KONFİGÜRASYON ---
  const CONFIG = {
    apiKey: "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", 
    model: "llama-3.3-70b-versatile",
    systemPrompt: "Sen Sistem-X v1.0'sın. Gelişmiş, mantıklı ve otoriter bir yapay zekasın. Yanıtların her zaman profesyonel, net ve Türkçe olmalı."
  };

  // --- SİSTEM-X VERİTABANI (DATABASE) ---
  // Burayı istediğin 3 soru-cevap ile doldurabilirsin.
  const SISTEM_X_DB = [
    {
      soru: "sistem-x nedir",
      cevap: "Sistem-X, (mistik kullanıcı) tarafından yapılan bir yapay zekadır."
    },
    {
      soru: "mustafa üstün", 
      cevap: "Mustafa Üstün, tarihin en iyi sosyal hocasıdır; tarihe çok büyük izler bırakmıştır."
    },
    {
      soru: "9",
      cevap: "Şu an Sistem-X Engine v1.0 Database Edition (ilk sürüm) sürümünü kullanıyorsunuz."
    }
  ];

  let conversationHistory = [];
  const messagesEl = document.getElementById('messages');
  const typingEl = document.getElementById('typing');
  const inputEl = document.getElementById('msg-input');

  window.onload = () => {
    addMsg('ai', 'SİSTEM-X', 'Çekirdek yüklendi. Sistem-X etkileşim için hazır. Bekliyorum.');
  };

  function addMsg(role, label, text, isDB = false) {
    const div = document.createElement('div');
    div.className = 'msg ' + role + (isDB ? ' db' : '');
    div.innerHTML = `<div class="msg-label">${label}</div>` + text.replace(/\n/g, '<br>');
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // Veritabanı kontrol motoru
  function checkDatabase(input) {
    const cleanInput = input.toLowerCase().trim();
    const match = SISTEM_X_DB.find(item => cleanInput.includes(item.soru));
    return match ? match.cevap : null;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    
    addMsg('user', 'Siz', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // 1. Önce Veritabanı Kontrolü
    const dbMatch = checkDatabase(text);
    if (dbMatch) {
        typingEl.style.display = 'block';
        setTimeout(() => {
            typingEl.style.display = 'none';
            addMsg('ai', 'SİSTEM-X [DB]', dbMatch, true);
        }, 400);
        return; 
    }
    
    // 2. Veritabanında yoksa AI'ya sor
    conversationHistory.push({ role: 'user', content: text });
    typingEl.style.display = 'block';
    messagesEl.scrollTop = messagesEl.scrollHeight;
    
    try {
      const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': 'Bearer ' + CONFIG.apiKey 
        },
        body: JSON.stringify({
          model: CONFIG.model,
          messages: [{ role: 'system', content: CONFIG.systemPrompt }, ...conversationHistory],
          temperature: 0.5
        })
      });

      const data = await resp.json();
      const reply = data.choices[0].message.content;
      
      conversationHistory.push({ role: 'assistant', content: reply });
      typingEl.style.display = 'none';
      addMsg('ai', 'SİSTEM-X', reply);
      
    } catch (e) {
      typingEl.style.display = 'none';
      addMsg('ai', 'ERROR', 'Veri iletim hatası: ' + e.message);
    }
  }

  document.getElementById('new-chat-btn').onclick = () => {
    conversationHistory = [];
    messagesEl.innerHTML = '';
    addMsg('ai', 'SİSTEM-X', 'Oturum sıfırlandı. Yeni veri girişi bekleniyor.');
  };

  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
